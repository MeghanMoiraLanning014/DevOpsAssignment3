version: '3.8'

services:
  web:
    image: node:18-alpine
    container_name: color-palette-web-part2
    ports:
      - "5001:4000"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    working_dir: /app
    environment:
      - NODE_OPTIONS=--max-old-space-size=1024
    command: >
      sh -c "apk add --no-cache python3 make g++ krb5-dev && 
             npm install --legacy-peer-deps && 
             npm run build && 
             npm run start"
    depends_on:
      - db

  db:
    image: mongo:latest
    container_name: color-palette-db-part2
    ports:
      - "27018:27017"
    volumes:
      - db_data_part2:/data/db

volumes:
  db_data_part2:
