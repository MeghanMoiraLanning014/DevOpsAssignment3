version: '3.8'

services:
  web:
    image: node:18-alpine
    container_name: color-palette-web-part2
    ports:
      - "5001:3000"
    env_file:
      - .env
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && npm run build && npm run start"
    depends_on:
      - db

  db:
    image: mongo:latest
    container_name: color-palette-db-part2
    ports:
      - "27018:27017"
    volumes:
      - db_data_part2:/data/db

volumes:
  db_data_part2:
